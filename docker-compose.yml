services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: asm
      POSTGRES_PASSWORD: asm
      POSTGRES_DB: asm
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asm -d asm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Host port yok — api/worker/beat iç ağdan redis:6379 kullanır (6379 çakışmasını önler)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${API_HOST_PORT:-8087}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://asm:asm@postgres:5432/asm
      DATABASE_URL_SYNC: postgresql://asm:asm@postgres:5432/asm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AI_ENABLED: "true"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1
      SCANNER_USE_EXTERNAL_TOOLS: "false"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      REQUIRE_DOMAIN_VERIFICATION: ${REQUIRE_DOMAIN_VERIFICATION:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://asm:asm@postgres:5432/asm
      DATABASE_URL_SYNC: postgresql://asm:asm@postgres:5432/asm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      AI_ENABLED: "true"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1
      SCANNER_USE_EXTERNAL_TOOLS: "false"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      REQUIRE_DOMAIN_VERIFICATION: ${REQUIRE_DOMAIN_VERIFICATION:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://asm:asm@postgres:5432/asm
      DATABASE_URL_SYNC: postgresql://asm:asm@postgres:5432/asm
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    environment:
      VITE_API_PROXY: http://api:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
